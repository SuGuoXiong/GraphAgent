# ACP（Agent Client Protocol）服务端配置
# 可通过 ACPConfig.from_yaml() 加载

acp:
  server:
    host: "127.0.0.1"
    port: 8080
    transports:
      - http_sse
    cors:
      allowed_origins:
        - "http://localhost:3000"
        - "http://127.0.0.1:8020"
        - "http://localhost:8020"
      allowed_methods:
        - GET
        - POST

  session:
    max_concurrent_sessions: 50
    session_timeout_minutes: 30
    cleanup_interval_minutes: 5
    max_pause_duration_minutes: 60
    checkpoint_ttl_minutes: 1440
    persistence:
      storage_dir: "data/conversations"

  execution:
    timeout_seconds: 300

  streaming:
    max_event_buffer: 1000
    heartbeat_interval_seconds: 15
