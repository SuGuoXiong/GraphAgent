# RBAC 安全策略配置
# 策略按优先级从高到低排列，首次匹配即生效。
# 无匹配策略时触发用户授权（AskUser）。

policies:
  # ─── MCP 工具策略 ───

  - subject: "*"
    action: "mcp__github_*"
    resource: "*"
    effect: allow
    description: "Github MCP 工具都为只读操作，因此不做权限管控"

  - subject: "*"
    action: "mcp__production_db__*"
    resource: "*"
    effect: deny
    description: "除 data_engineer 外禁止操作生产数据库 MCP 工具"

  # ─── 敏感文件策略 ───

  - subject: "plan_agent"
    action: "read_file"
    resource: "file:**/*.env"
    effect: allow
    description: "仅 PlanAgent 可读取 .env 敏感配置文件"

  - subject: "*"
    action: "*"
    resource: "file:**/*.env"
    effect: deny
    description: "禁止任意 agent 通过任意工具访问 .env 等敏感配置文件"

  # ─── 文件操作策略 ───
  - subject: "*"
    action: "list_directory"
    resource: "*"
    effect: allow
    description: "允许agent遍历所有目录"

  - subject: "*"
    action: "generate_pptx"
    resource: "*"
    effect: allow
    description: "允许agent遍历所有目录"

  - subject: "*"
    action: "file_exists"
    resource: "*"
    effect: allow
    description: "允许agent遍历所有目录"

  - subject: "*"
    action: "read_file"
    resource: "*"
    effect: allow
    description: "允许agent读取所有文件"

  - subject: "*"
    action: "search_files"
    resource: "*"
    effect: allow
    description: "允许agent读取所有文件"

  - subject: "*"
    action: "search_content"
    resource: "*"
    effect: allow
    description: "允许agent读取所有文件"

  - subject: "*"
    action: "write_file"
    resource: "file:/etc/**"
    effect: deny
    description: "禁止通过 write_file 写入 /etc 系统配置目录"

  - subject: "*"
    action: "write_file"
    resource: "*"
    effect: allow
    description: "允许agent写入文件（除已明确禁止的路径外）"

  - subject: "*"
    action: "delete_file"
    resource: "file:/*"
    effect: deny
    description: "禁止在根目录执行文件删除操作"

  # ─── 计算与时间工具（低风险，只读）───

  - subject: "*"
    action: "safe_calculator"
    resource: "*"
    effect: allow
    description: "数学计算工具，纯函数无副作用"

  - subject: "*"
    action: "get_utc_time"
    resource: "*"
    effect: allow
    description: "UTC时间查询，纯函数无副作用"

  # ─── JSON 工具 ───

  - subject: "*"
    action: "json_load"
    resource: "*"
    effect: allow
    description: "JSON解析，纯数据转换无副作用"

  - subject: "*"
    action: "json_dump"
    resource: "*"
    effect: allow
    description: "JSON序列化，纯数据转换无副作用"

  # ─── 网页工具 ───

  - subject: "*"
    action: "search_web"
    resource: "*"
    effect: allow
    description: "网页搜索，只读操作"

  - subject: "*"
    action: "fetch_web"
    resource: "*"
    effect: allow
    description: "网页抓取，只读操作"

  # ─── 文件追加工具 ───

  - subject: "*"
    action: "append_file"
    resource: "*"
    effect: allow
    description: "文件追加，低风险写操作"

  # ─── 用户交互工具 ───

  - subject: "*"
    action: "ask_user"
    resource: "*"
    effect: allow
    description: "Agent向用户提问，标准交互流程"

  # ─── 命令执行策略 ───

  - subject: "*"
    action: "run_command"
    resource: "cmd:rm*"
    effect: deny
    description: "禁止执行 rm 系列危险命令"

  - subject: "*"
    action: "run_command"
    resource: "cmd:shutdown*"
    effect: deny
    description: "禁止执行 shutdown 等系统级命令"

  # ─── SubAgent 专项策略 ───

  - subject: "subagent:code_reviewer"
    action: "read_*"
    resource: "*"
    effect: allow
    description: "代码审查 Agent 的 read_* 匹配工具自动放行，其余工具触发用户授权"

  - subject: "subagent:system_admin"
    action: "*"
    resource: "*"
    effect: allow
    description: "系统管理 Agent 拥有完全权限"

  # ─── 防御性策略（纵深防御） ───

  - subject: "guard_agent"
    action: "*"
    resource: "*"
    effect: deny
    description: "GuardAgent 不执行任何工具"

  - subject: "plan_agent"
    action: "*"
    resource: "*"
    effect: deny
    description: "PlanAgent 不执行任何工具"
