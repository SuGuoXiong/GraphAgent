<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphAgent Console</title>
<style>
  :root {
    --bg: #0f1117;
    --sidebar-bg: #161822;
    --card-bg: #1a1d2e;
    --border: #2a2d3e;
    --text: #e1e4eb;
    --text-muted: #8b8fa3;
    --accent: #6c8cff;
    --accent-hover: #8ba4ff;
    --success: #34d399;
    --warning: #fbbf24;
    --error: #f87171;
    --user-msg: #1e3a5f;
    --agent-msg: #1a2a1f;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

  .app { display:flex; height:100vh; }

  .sidebar {
    width: 300px; min-width: 300px; background: var(--sidebar-bg);
    border-right: 1px solid var(--border); display:flex; flex-direction:column;
  }
  .sidebar-header {
    padding: 20px 16px 12px; border-bottom: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sidebar-header h1 { font-size:18px; font-weight:600; letter-spacing:-0.3px; }
  .logo-dot { display:inline-block; width:8px; height:8px; background:var(--accent); border-radius:50%; margin-right:8px; }
  .btn {
    display:inline-flex; align-items:center; gap:6px; padding:8px 14px;
    border-radius: var(--radius-sm); border:1px solid var(--border);
    background: var(--card-bg); color: var(--text); cursor:pointer;
    font-size:13px; font-weight:500; transition: all 0.15s;
  }
  .btn:hover { background: #252840; border-color: #3a3d52; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { color: var(--error); }
  .btn-danger:hover { background: #3d1f1f; border-color: #5a2a2a; }
  .btn-sm { padding:4px 10px; font-size:12px; }

  .session-list { flex:1; overflow-y:auto; padding:8px; }
  .session-item {
    padding:12px; border-radius: var(--radius-sm); cursor:pointer;
    border:1px solid transparent; margin-bottom:4px; transition: all 0.12s;
  }
  .session-item:hover { background: var(--card-bg); }
  .session-item.active { background: var(--card-bg); border-color: var(--accent); }
  .session-item-title { font-size:14px; font-weight:500; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .session-item-meta { font-size:11px; color: var(--text-muted); display:flex; gap:12px; }
  .session-item-actions { display:flex; gap:6px; margin-top:6px; }

  .sidebar-footer { padding:12px 16px; border-top:1px solid var(--border); }
  .status-indicator { display:flex; align-items:center; gap:8px; font-size:12px; color: var(--text-muted); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--success); }
  .status-dot.disconnected { background:var(--error); }

  .main { flex:1; display:flex; flex-direction:column; min-width:0; }

  .chat-header {
    padding:16px 24px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .chat-header h2 { font-size:16px; font-weight:500; }
  .chat-header-meta { font-size:12px; color:var(--text-muted); }

  .chat-messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:16px; }

  .message { display:flex; gap:12px; max-width:85%; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .message.user { align-self:flex-end; flex-direction:row-reverse; }
  .message.agent { align-self:flex-start; }

  .message-avatar {
    width:34px; height:34px; border-radius:50%; display:flex;
    align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
  }
  .message.user .message-avatar { background: #2a4a7a; }
  .message.agent .message-avatar { background: #2a5a3a; }

  .message-bubble {
    padding:12px 16px; border-radius: var(--radius); font-size:14px; line-height:1.6;
    word-break:break-word; position:relative;
  }
  .message.user .message-bubble { background: var(--user-msg); border-bottom-right-radius:4px; }
  .message.agent .message-bubble { background: var(--agent-msg); border-bottom-left-radius:4px; }

  .message-bubble pre {
    background: #0d1117; border:1px solid var(--border); border-radius: var(--radius-sm);
    padding:12px 16px; overflow-x:auto; font-size:13px; line-height:1.5; margin:8px 0;
  }
  .message-bubble code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size:13px; }
  .message-bubble p { margin:4px 0; }
  .message-bubble ul, .message-bubble ol { margin:4px 0; padding-left:20px; }
  .message-bubble blockquote {
    border-left:3px solid var(--accent); margin:8px 0; padding:4px 12px;
    color: var(--text-muted); background: rgba(108,140,255,0.05);
  }

  .event-card {
    align-self:center; font-size:12px; padding:6px 14px;
    border-radius:20px; background: var(--card-bg); border:1px solid var(--border);
    color: var(--text-muted); display:flex; align-items:center; gap:8px;
    animation: fadeIn 0.2s ease; max-width:90%;
  }
  .event-card.tool { border-color: #5a4a2a; color: var(--warning); }
  .event-card.phase { border-color: #2a4a5a; color: #60a5fa; }
  .event-card.error { border-color: #5a2a2a; color: var(--error); }

  .chat-input-area { padding:16px 24px; border-top:1px solid var(--border); }
  .chat-input-wrap {
    display:flex; gap:10px; background: var(--card-bg);
    border:1px solid var(--border); border-radius: var(--radius); padding:8px 12px;
    transition: border-color 0.15s;
  }
  .chat-input-wrap:focus-within { border-color: var(--accent); }
  .chat-input-wrap textarea {
    flex:1; background:transparent; border:none; color:var(--text);
    font-size:14px; font-family:inherit; resize:none; outline:none;
    min-height:24px; max-height:120px; line-height:1.5;
  }
  .chat-input-wrap textarea::placeholder { color: var(--text-muted); }
  .chat-input-wrap button {
    background: var(--accent); border:none; color:#fff; width:38px; height:38px;
    border-radius:50%; cursor:pointer; font-size:18px; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
    transition: background 0.15s; align-self:flex-end;
  }
  .chat-input-wrap button:hover { background: var(--accent-hover); }
  .chat-input-wrap button:disabled { opacity:0.4; cursor:not-allowed; }

  .empty-state {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; color: var(--text-muted); gap:12px;
  }
  .empty-state-icon { font-size:48px; opacity:0.4; }
  .empty-state h3 { font-size:18px; font-weight:500; color: var(--text); }
  .empty-state p { font-size:14px; }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3d52; }

  .typing-dots { display:flex; gap:4px; padding:4px 0; }
  .typing-dots span { width:6px; height:6px; background:var(--text-muted); border-radius:50%; animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay:0.2s; }
  .typing-dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

  @media (max-width:768px) {
    .sidebar { width:100%; min-width:100%; position:absolute; z-index:10; height:100%; display:none; }
    .sidebar.open { display:flex; }
    .message { max-width:95%; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo-dot"></span>GraphAgent</h1>
      <button class="btn btn-primary btn-sm" id="btnNewSession" title="新建会话">+ 新建</button>
    </div>
    <div class="session-list" id="sessionList">
      <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;" id="sessionListEmpty">
        暂无会话，点击「+ 新建」开始
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="status-indicator">
        <span class="status-dot disconnected" id="statusDot"></span>
        <span id="statusText">检测连接中…</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="chat-header" id="chatHeader" style="display:none;">
      <div>
        <h2 id="chatTitle">选择会话</h2>
        <span class="chat-header-meta" id="chatMeta"></span>
      </div>
      <button class="btn btn-sm" id="btnToggleSidebar">☰ 会话</button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">&#9729;</div>
        <h3>GraphAgent Console</h3>
        <p>创建一个新会话开始对话</p>
        <button class="btn btn-primary" id="btnNewSessionEmpty">+ 新建会话</button>
      </div>
    </div>

    <div class="chat-input-area" id="chatInputArea" style="display:none;">
      <div class="chat-input-wrap">
        <textarea id="userInput" placeholder="输入消息，Enter 发送，Shift+Enter 换行…" rows="1"></textarea>
        <button id="btnSend" title="发送">&#10132;</button>
      </div>
    </div>
  </main>
</div>

<script>
(function() {
  'use strict';

  // ── Helpers ──────────────────────────────────
  var el = function(sel) { return document.querySelector(sel); };
  var escHtml = function(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; };

  function randId() {
    var arr = new Uint8Array(6);
    if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
      crypto.getRandomValues(arr);
    } else {
      for (var i = 0; i < 6; i++) arr[i] = Math.floor(Math.random() * 256);
    }
    var hex = '';
    for (var i = 0; i < 6; i++) hex += arr[i].toString(16).padStart(2, '0');
    return hex;
  }

  function formatTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var now = new Date();
    var diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
    return d.toLocaleDateString('zh-CN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function simpleMarkdown(text) {
    if (!text) return '';
    var html = escHtml(text);
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    html = html.replace(/^&gt; (.*)$/gm, '<blockquote>$1</blockquote>');
    html = html.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
    var hasList = false;
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, function(m) { hasList = true; return '<ul>' + m + '</ul>'; });
    html = html.replace(/\n\n/g, '</p><p>');
    html = html.replace(/\n/g, '<br>');
    return '<p>' + html + '</p>';
  }

  // ── State ────────────────────────────────────
  var BASE = window.location.origin;
  var activeSessionId = null;
  var sessions = [];
  var isStreaming = false;

  function setStatus(connected, text) {
    var dot = el('#statusDot');
    var st = el('#statusText');
    dot.className = 'status-dot' + (connected ? '' : ' disconnected');
    st.textContent = text;
  }

  // ── API calls ────────────────────────────────
  async function apiCall(payload) {
    console.log('[API] request:', payload.event, payload);
    var resp = await fetch(BASE + '/acp/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    var data = await resp.json();
    console.log('[API] response:', data.event, data);
    return data;
  }

  async function listSessions() {
    try {
      var reply = await apiCall({
        version: '1.0', type: 'request', event: 'list_sessions',
        id: randId(), timestamp: new Date().toISOString(), payload: {},
      });
      if (reply.event === 'session_list') {
        sessions = reply.payload.sessions || [];
        renderSessionList();
      }
    } catch(e) {
      console.error('[listSessions] error:', e);
    }
  }

  async function createSession() {
    console.log('[createSession] clicked');
    try {
      var reply = await apiCall({
        version: '1.0', type: 'request', event: 'create_session',
        id: randId(), timestamp: new Date().toISOString(), payload: { config: null },
      });
      console.log('[createSession] reply:', reply);
      if (reply.event === 'session_created') {
        var sid = reply.payload.session_id;
        console.log('[createSession] session created:', sid);
        await listSessions();
        await switchSession(sid);
      } else {
        setStatus(false, '创建会话失败: ' + (reply.payload && reply.payload.message || reply.event));
      }
    } catch(e) {
      console.error('[createSession] error:', e);
      setStatus(false, '创建会话出错: ' + e.message);
    }
  }

  async function loadSession(sid) {
    try {
      var reply = await apiCall({
        version: '1.0', type: 'request', event: 'load_session',
        id: randId(), timestamp: new Date().toISOString(), payload: { session_id: sid },
      });
      return reply.event === 'session_loaded';
    } catch(e) {
      console.error('[loadSession] error:', e);
      return false;
    }
  }

  async function deleteSession(sid) {
    if (!confirm('确定要删除此会话吗？此操作不可撤销。')) return;
    try {
      await apiCall({
        version: '1.0', type: 'request', event: 'delete_session',
        id: randId(), timestamp: new Date().toISOString(), payload: { session_id: sid },
      });
      if (activeSessionId === sid) {
        activeSessionId = null;
        showEmptyState();
      }
      await listSessions();
    } catch(e) {
      console.error('[deleteSession] error:', e);
    }
  }

  // ── SSE streaming ────────────────────────────
  async function sendMessage() {
    if (isStreaming || !activeSessionId) return;
    var input = el('#userInput');
    var content = input.value.trim();
    if (!content) return;

    input.value = '';
    input.style.height = 'auto';
    isStreaming = true;
    el('#btnSend').disabled = true;
    hideEl('#emptyState');

    addMessage('user', content);
    var typingMsg = addTypingIndicator();
    var agentContent = '';
    var hasFinalAnswer = false;

    try {
      var sendResp = await fetch(BASE + '/acp/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          version: '1.0', type: 'request', event: 'send_message',
          id: randId(), timestamp: new Date().toISOString(),
          payload: { session_id: activeSessionId, content: content },
        }),
      });

      if (sendResp.status !== 202) {
        var err = await sendResp.json();
        removeTyping(typingMsg);
        addEvent('error', '请求失败: ' + (err.payload && err.payload.message || '未知错误'));
        isStreaming = false;
        el('#btnSend').disabled = false;
        return;
      }

      var sseResp = await fetch(BASE + '/acp/events?session_id=' + encodeURIComponent(activeSessionId));
      var reader = sseResp.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      while (true) {
        var readResult = await reader.read();
        if (readResult.done) break;
        buffer += decoder.decode(readResult.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.indexOf('data:') !== 0) continue;
          var data = line.slice(5).trim();
          if (!data || data === '{}') continue;
          try {
            var msg = JSON.parse(data);
            handleSSEEvent(msg, typingMsg, function(c) { agentContent += c; hasFinalAnswer = true; });
          } catch(parseErr) {}
        }
      }
    } catch(e) {
      console.error('[sendMessage] error:', e);
      addEvent('error', '连接错误: ' + e.message);
    } finally {
      removeTyping(typingMsg);
      if (hasFinalAnswer) {
        addMessage('agent', agentContent);
      }
      isStreaming = false;
      el('#btnSend').disabled = false;
      await listSessions();
      input.focus();
    }
  }

  function handleSSEEvent(msg, typingMsg, onFinalAnswer) {
    switch (msg.event) {
      case 'phase_changed':
        var phase = msg.payload.phase || '';
        var detail = msg.payload.detail || msg.payload.reason || '';
        if (phase === 'compression') {
          addEvent('phase', detail || '上下文压缩');
        } else if (phase === 'decision') {
          addEvent('phase', (msg.payload.agent_name || 'Agent') + ': ' + (detail || '决策中'));
        } else {
          var agentName = msg.payload.agent_name || '';
          var label = agentName ? agentName + ': ' : '';
          addEvent('phase', label + (detail || phase));
        }
        break;
      case 'tool_call':
        addEvent('tool', '调用工具: ' + (msg.payload.tool_name || 'unknown'));
        break;
      case 'tool_result':
        addEvent('tool', '工具返回: ' + ((msg.payload.output_preview || '').slice(0, 80)));
        break;
      case 'agent_message':
        if (msg.payload.content) updateTyping(typingMsg, msg.payload.content);
        break;
      case 'final_answer':
        onFinalAnswer(msg.payload.content || '');
        break;
      case 'execution_complete':
        addEvent('phase', '执行完成 · 轮次 ' + (msg.payload.turn_count || ''));
        break;
      case 'error':
        addEvent('error', '错误: ' + (msg.payload.message || '服务器错误'));
        break;
    }
  }

  // ── UI: Messages ──────────────────────────────
  function addMessage(role, content) {
    var container = el('#chatMessages');
    var div = document.createElement('div');
    div.className = 'message ' + role;
    var avatarIcon = role === 'user' ? '👤' : '🤖';
    div.innerHTML = '<div class="message-avatar">' + avatarIcon + '</div>' +
      '<div class="message-bubble">' + simpleMarkdown(content) + '</div>';
    container.appendChild(div);
    scrollToBottom();
  }

  function addTypingIndicator() {
    var container = el('#chatMessages');
    var div = document.createElement('div');
    div.className = 'message agent';
    div.id = 'typing-' + Date.now();
    div.innerHTML = '<div class="message-avatar">🤖</div>' +
      '<div class="message-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    container.appendChild(div);
    scrollToBottom();
    return div;
  }

  function updateTyping(msgEl, text) {
    if (!msgEl) return;
    var bubble = msgEl.querySelector('.message-bubble');
    if (bubble) bubble.innerHTML = simpleMarkdown(text);
    scrollToBottom();
  }

  function removeTyping(msgEl) {
    if (msgEl && msgEl.parentNode) msgEl.remove();
  }

  function addEvent(type, text) {
    var container = el('#chatMessages');
    var div = document.createElement('div');
    div.className = 'event-card ' + type;
    div.textContent = text;
    container.appendChild(div);
    scrollToBottom();
  }

  function scrollToBottom() {
    var messagesEl = el('#chatMessages');
    requestAnimationFrame(function() { messagesEl.scrollTop = messagesEl.scrollHeight; });
  }

  // ── UI: Sessions ──────────────────────────────
  function renderSessionList() {
    var list = el('#sessionList');
    if (!sessions.length) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">暂无会话</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < sessions.length; i++) {
      var s = sessions[i];
      var activeClass = s.session_id === activeSessionId ? ' active' : '';
      var title = escHtml(s.preview || '新会话');
      html += '<div class="session-item' + activeClass + '" data-sid="' + escHtml(s.session_id) + '">' +
        '<div class="session-item-title">' + title + '</div>' +
        '<div class="session-item-meta">' +
          '<span>轮次 ' + (s.turn_count || 0) + '</span>' +
          '<span>消息 ' + (s.message_count || 0) + '</span>' +
          '<span>' + formatTime(s.updated_at) + '</span>' +
        '</div>' +
        '<div class="session-item-actions">' +
          '<button class="btn btn-danger btn-sm" data-delete="' + escHtml(s.session_id) + '">删除</button>' +
        '</div>' +
      '</div>';
    }
    list.innerHTML = html;
    bindSessionEvents();
  }

  function bindSessionEvents() {
    var items = document.querySelectorAll('.session-item');
    for (var i = 0; i < items.length; i++) {
      (function(item) {
        item.addEventListener('click', function(e) {
          var sid = item.getAttribute('data-sid');
          if (sid) switchSession(sid);
        });
      })(items[i]);
    }
    var deleteBtns = document.querySelectorAll('[data-delete]');
    for (var j = 0; j < deleteBtns.length; j++) {
      (function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var sid = btn.getAttribute('data-delete');
          if (sid) deleteSession(sid);
        });
      })(deleteBtns[j]);
    }
  }

  function clearChatMessages() {
    var container = el('#chatMessages');
    var nodes = container.querySelectorAll('.message, .event-card');
    for (var i = 0; i < nodes.length; i++) {
      nodes[i].remove();
    }
  }

  function showEl(sel) { var e = el(sel); if (e) e.style.display = ''; }
  function hideEl(sel) { var e = el(sel); if (e) e.style.display = 'none'; }
  function showFlex(sel) { var e = el(sel); if (e) e.style.display = 'flex'; }
  function showBlock(sel) { var e = el(sel); if (e) e.style.display = 'block'; }

  async function switchSession(sid) {
    if (activeSessionId === sid) return;
    console.log('[switchSession] loading:', sid);
    var ok = await loadSession(sid);
    if (!ok) {
      addEvent('error', '加载会话失败');
      setStatus(false, '加载会话失败');
      return;
    }
    activeSessionId = sid;
    clearChatMessages();
    hideEl('#emptyState');
    showFlex('#chatHeader');
    showBlock('#chatInputArea');
    var s = null;
    for (var i = 0; i < sessions.length; i++) {
      if (sessions[i].session_id === sid) { s = sessions[i]; break; }
    }
    el('#chatTitle').textContent = s ? (s.preview || '会话') : '会话';
    el('#chatMeta').textContent = '会话ID: ' + sid.slice(0,12) + '… · ' + (s ? s.turn_count : 0) + ' 轮对话';
    renderSessionList();
    el('#userInput').focus();
    setStatus(true, '已连接');
  }

  function showEmptyState() {
    activeSessionId = null;
    clearChatMessages();
    showFlex('#emptyState');
    hideEl('#chatHeader');
    hideEl('#chatInputArea');
    renderSessionList();
  }

  // ── UI: Input ─────────────────────────────────
  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(inputEl) {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  function toggleSidebar() {
    el('#sidebar').classList.toggle('open');
  }

  // ── Health check ──────────────────────────────
  async function checkHealth() {
    try {
      var resp = await fetch(BASE + '/health');
      var data = await resp.json();
      if (data.status === 'ok') {
        setStatus(true, '已连接 · ' + (data.active_sessions || 0) + ' 个活跃会话');
        return true;
      }
    } catch(e) {}
    setStatus(false, '未连接');
    return false;
  }

  // ── Init ──────────────────────────────────────
  function init() {
    console.log('[init] GraphAgent Web UI starting...');
    console.log('[init] BASE:', BASE);

    // Wire up buttons via addEventListener (not inline onclick)
    el('#btnNewSession').addEventListener('click', createSession);
    el('#btnNewSessionEmpty').addEventListener('click', createSession);
    el('#btnSend').addEventListener('click', sendMessage);
    el('#btnToggleSidebar').addEventListener('click', toggleSidebar);

    el('#userInput').addEventListener('keydown', handleKeyDown);
    el('#userInput').addEventListener('input', function() { autoResize(this); });

    console.log('[init] Event listeners bound');

    checkHealth().then(function(ok) {
      if (ok) listSessions();
    });

    setInterval(function() {
      checkHealth().then(function(alive) {
        if (alive) listSessions();
      });
    }, 30000);
  }

  // Wait for DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
